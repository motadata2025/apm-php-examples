# Symfony Application
server {
    listen 8082;
    listen [::]:8082;
    server_name _;
    root /var/www/symfony-app/public;
    index index.php;

    # Security
    server_tokens off;
    
    # Rate limiting for API endpoints
    location /apm/ {
        limit_req zone=api burst=20 nodelay;
        try_files $uri /index.php$is_args$args;
    }

    # Main application
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # PHP processing
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php-fpm;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param APP_ENV prod;
        
        # Security headers for PHP
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        
        # Prevents URIs which include the front controller
        internal;
    }

    # Return 404 for all other php files not matching the front controller
    location ~ \.php$ {
        return 404;
    }

    # Static files caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Symfony specific optimizations
    location /_wdt {
        try_files $uri /index.php$is_args$args;
    }

    location /_profiler {
        try_files $uri /index.php$is_args$args;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ /(var|vendor|composer\.(json|lock)|\.env) {
        deny all;
    }

    # Logging
    access_log /var/log/nginx/symfony.access.log main;
    error_log /var/log/nginx/symfony.error.log warn;
}
