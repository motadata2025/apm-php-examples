# APM PHP Examples - Main Landing Page
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /var/www/html;
    index index.html index.php;

    # Security
    server_tokens off;
    
    # Main landing page
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Application redirects
    location /simple-php {
        return 301 http://$host:8080/;
    }

    location /symfony {
        return 301 http://$host:8082/;
    }

    location /codeigniter {
        return 301 http://$host:8081/;
    }

    location /laravel {
        return 301 http://$host:8083/;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ /(config|logs|vendor|node_modules) {
        deny all;
    }
}
