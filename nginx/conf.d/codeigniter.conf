# CodeIgniter Application
server {
    listen 8081;
    listen [::]:8081;
    server_name _;
    root /var/www/codeigniter-app/public;
    index index.php;

    # Security
    server_tokens off;
    
    # Rate limiting for API endpoints
    location /apm/ {
        limit_req zone=api burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Main application
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # CodeIgniter specific parameters
        fastcgi_param CI_ENVIRONMENT production;
        
        # Security headers for PHP
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
    }

    # Static files caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # CodeIgniter specific rules
    location ~ ^/(system|application) {
        deny all;
        return 404;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ /(vendor|composer\.(json|lock)|\.env|writable) {
        deny all;
    }

    # Logging
    access_log /var/log/nginx/codeigniter.access.log main;
    error_log /var/log/nginx/codeigniter.error.log warn;
}
