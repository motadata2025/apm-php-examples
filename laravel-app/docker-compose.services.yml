version: '3.8'

# Laravel App Application - Supporting Services
# Provides MySQL, PostgreSQL, and Redis for Laravel App application

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: laravel_app-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: laravel_app_db
      MYSQL_USER: laravel_app_user
      MYSQL_PASSWORD: laravel_app_password
    ports:
      - "3311:3306"
    volumes:
      - laravel_app_mysql_data:/var/lib/mysql
    networks:
      - laravel_app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: laravel_app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: laravel_app_db
      POSTGRES_USER: laravel_app_user
      POSTGRES_PASSWORD: laravel_app_password
    ports:
      - "5437:5432"
    volumes:
      - laravel_app_postgres_data:/var/lib/postgresql/data
    networks:
      - laravel_app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel_app_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: laravel_app-redis
    restart: unless-stopped
    ports:
      - "6384:6379"
    volumes:
      - laravel_app_redis_data:/data
    networks:
      - laravel_app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # phpMyAdmin for MySQL Management
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: laravel_app-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8092:80"
    depends_on:
      - mysql
    networks:
      - laravel_app-network

  # pgAdmin for PostgreSQL Management (FIXED)
  pgadmin:
    image: dpage/pgadmin4
    container_name: laravel_app-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_LISTEN_ADDRESS: '0.0.0.0'
    ports:
      - "8093:80"
    volumes:
      - laravel_app_pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - laravel_app-network

  # Redis Commander for Redis Management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: laravel_app-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8094:8081"
    depends_on:
      - redis
    networks:
      - laravel_app-network

volumes:
  laravel_app_mysql_data:
    driver: local
  laravel_app_postgres_data:
    driver: local
  laravel_app_redis_data:
    driver: local
  laravel_app_pgadmin_data:
    driver: local

networks:
  laravel_app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
