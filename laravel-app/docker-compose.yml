# Laravel Application - Supporting Services Only
# Application runs locally, Docker provides database/cache services

version: '3.8'

services:

  # MySQL Database for Laravel
  apm-mysql-laravel:
    image: mysql:8.0
    container_name: apm_mysql_laravel
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: laravel_app_db
      MYSQL_USER: laravel-app_user
      MYSQL_PASSWORD: laravel-app_password
    ports:
      - "3311:3306"
    volumes:
      - apm_mysql_laravel_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # PostgreSQL Database for Laravel
  apm-postgres-laravel:
    image: postgres:15
    container_name: apm_postgres_laravel
    environment:
      POSTGRES_DB: laravel_app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5437:5432"
    volumes:
      - apm_postgres_laravel_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d laravel_app_db"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis Cache for Laravel
  apm-redis-laravel:
    image: redis:7-alpine
    container_name: apm_redis_laravel
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6384:6379"
    volumes:
      - apm_redis_laravel_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  apm_mysql_laravel_data:
    driver: local
  apm_postgres_laravel_data:
    driver: local
  apm_redis_laravel_data:
    driver: local