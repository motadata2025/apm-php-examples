# Laravel Application - Supporting Services Only
# Application runs locally, Docker provides database/cache services

version: '3.8'

services:

  # MySQL Database for Laravel
  laravel-app-mysql:
    image: mysql:8.0
    container_name: laravel-app_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: laravel_app_db
      MYSQL_USER: laravel-app_user
      MYSQL_PASSWORD: laravel-app_password
    ports:
      - "3311:3306"
    volumes:
      - laravel-app_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - laravel-app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # PostgreSQL Database for Laravel
  laravel-app-postgres:
    image: postgres:15
    container_name: laravel-app_postgres
    environment:
      POSTGRES_DB: laravel_app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5437:5432"
    volumes:
      - laravel-app_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - laravel-app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d laravel_app_db"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis Cache for Laravel
  laravel-app-redis:
    image: redis:7-alpine
    container_name: laravel-app_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6384:6379"
    volumes:
      - laravel-app_redis_data:/data
    networks:
      - laravel-app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  laravel-app_mysql_data:
    driver: local
  laravel-app_postgres_data:
    driver: local
  laravel-app_redis_data:
    driver: local

networks:
  laravel-app-network:
    driver: bridge
    name: laravel-app_network
    ipam:
      config:
        - subnet: 172.34.0.0/16
