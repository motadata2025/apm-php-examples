# CodeIgniter Application - Supporting Services Only
# Application runs locally, Docker provides database/cache services

version: '3.8'

services:

  # MySQL Database for CodeIgniter
  apm-mysql-codeigniter:
    image: mysql:8.0
    container_name: apm_mysql_codeigniter
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: codeigniter_app_db
      MYSQL_USER: codeigniter_app_user
      MYSQL_PASSWORD: codeigniter_app_password
    ports:
      - "3310:3306"
    volumes:
      - apm_mysql_codeigniter_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # PostgreSQL Database for CodeIgniter
  apm-postgres-codeigniter:
    image: postgres:15
    container_name: apm_postgres_codeigniter
    environment:
      POSTGRES_DB: codeigniter_app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5436:5432"
    volumes:
      - apm_postgres_codeigniter_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codeigniter_app_db"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis Cache for CodeIgniter
  apm-redis-codeigniter:
    image: redis:7-alpine
    container_name: apm_redis_codeigniter
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6383:6379"
    volumes:
      - apm_redis_codeigniter_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  apm_mysql_codeigniter_data:
    driver: local
  apm_postgres_codeigniter_data:
    driver: local
  apm_redis_codeigniter_data:
    driver: local