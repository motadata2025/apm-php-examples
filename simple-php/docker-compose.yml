# Simple PHP Application - Supporting Services Only
# Application runs locally, Docker provides database/cache services

version: '3.8'

services:

  # MySQL Database for Simple PHP
  simple-php-mysql:
    image: mysql:8.0
    container_name: simple_php_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: simple_php_db
      MYSQL_USER: simple_php_user
      MYSQL_PASSWORD: simple_php_password
    ports:
      - "3307:3306"
    volumes:
      - simple_php_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - simple-php-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # PostgreSQL Database for Simple PHP
  simple-php-postgres:
    image: postgres:15
    container_name: simple_php_postgres
    environment:
      POSTGRES_DB: simple_php_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5433:5432"
    volumes:
      - simple_php_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - simple-php-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simple_php_db"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis Cache for Simple PHP
  simple-php-redis:
    image: redis:7-alpine
    container_name: simple_php_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - simple_php_redis_data:/data
    networks:
      - simple-php-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  simple_php_mysql_data:
    driver: local
  simple_php_postgres_data:
    driver: local
  simple_php_redis_data:
    driver: local

networks:
  simple-php-network:
    driver: bridge
    name: simple_php_network
    ipam:
      config:
        - subnet: 172.30.0.0/16
