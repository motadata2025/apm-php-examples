# Simple PHP Application - Supporting Services Only
# Application runs locally, Docker provides database/cache services

version: '3.8'

services:

  # MySQL Database for Simple PHP
  apm-mysql-simple:
    image: mysql:8.0
    container_name: apm_mysql_simple
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: simple_php_db
      MYSQL_USER: simple_php_user
      MYSQL_PASSWORD: simple_php_password
    ports:
      - "3307:3306"
    volumes:
      - apm_mysql_simple_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # PostgreSQL Database for Simple PHP
  apm-postgres-simple:
    image: postgres:15
    container_name: apm_postgres_simple
    environment:
      POSTGRES_DB: simple_php_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5433:5432"
    volumes:
      - apm_postgres_simple_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simple_php_db"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis Cache for Simple PHP
  apm-redis-simple:
    image: redis:7-alpine
    container_name: apm_redis_simple
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - apm_redis_simple_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  apm_mysql_simple_data:
    driver: local
  apm_postgres_simple_data:
    driver: local
  apm_redis_simple_data:
    driver: local