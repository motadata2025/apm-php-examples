version: '3.8'

# Simple PHP Application - Supporting Services
# Provides MySQL, PostgreSQL, and Redis for Simple PHP application

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: simple-php-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: simple_php_db
      MYSQL_USER: simple_php_user
      MYSQL_PASSWORD: simple_php_password
    ports:
      - "3307:3306"
    volumes:
      - simple_php_mysql_data:/var/lib/mysql
    networks:
      - simple-php-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: simple-php-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: simple_php_db
      POSTGRES_USER: simple_php_user
      POSTGRES_PASSWORD: simple_php_password
    ports:
      - "5433:5432"
    volumes:
      - simple_php_postgres_data:/var/lib/postgresql/data
    networks:
      - simple-php-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simple_php_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: simple-php-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - simple_php_redis_data:/data
    networks:
      - simple-php-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # phpMyAdmin for MySQL Management
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: simple-php-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - simple-php-network

  # pgAdmin for PostgreSQL Management
  pgadmin:
    image: dpage/pgadmin4
    container_name: simple-php-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_LISTEN_ADDRESS: '0.0.0.0'
    ports:
      - "8081:80"
    volumes:
      - simple_php_pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - simple-php-network

  # Redis Commander for Redis Management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: simple-php-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8082:8081"
    depends_on:
      - redis
    networks:
      - simple-php-network

volumes:
  simple_php_mysql_data:
    driver: local
  simple_php_postgres_data:
    driver: local
  simple_php_redis_data:
    driver: local
  simple_php_pgadmin_data:
    driver: local

networks:
  simple-php-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
