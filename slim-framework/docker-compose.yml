version: '3.8'

# Slim Framework Application - Docker Compose
# Supports multi-PHP version deployment

services:
  slim-framework:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.4}
    container_name: apm-slim-framework
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8003}:8003"
    volumes:
      - .:/var/www/html
      - ./var/log:/var/www/html/var/log
    environment:
      - APP_ENV=${APP_ENV:-production}
      - PHP_VERSION=${PHP_VERSION:-8.4}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=apm_examples
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=rootpassword
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=apm_examples
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=postgrespassword
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mysql
      - postgres
      - redis
    networks:
      - apm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Import shared services
  mysql:
    extends:
      file: ../docker-compose.services.yml
      service: mysql

  postgres:
    extends:
      file: ../docker-compose.services.yml
      service: postgres

  redis:
    extends:
      file: ../docker-compose.services.yml
      service: redis

networks:
  apm-network:
    external: true
