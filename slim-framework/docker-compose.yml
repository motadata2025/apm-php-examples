# Slim Framework Application - Supporting Services Only
# Application runs locally, Docker provides database/cache services

version: '3.8'

services:

  # MySQL Database for Slim Framework
  apm-mysql-slim:
    image: mysql:8.0
    container_name: apm_mysql_slim
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: slim_framework_db
      MYSQL_USER: slim-framework_user
      MYSQL_PASSWORD: slim-framework_password
    ports:
      - "3309:3306"
    volumes:
      - apm_mysql_slim_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # PostgreSQL Database for Slim Framework
  apm-postgres-slim:
    image: postgres:15
    container_name: apm_postgres_slim
    environment:
      POSTGRES_DB: slim_framework_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5435:5432"
    volumes:
      - apm_postgres_slim_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d slim_framework_db"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis Cache for Slim Framework
  apm-redis-slim:
    image: redis:7-alpine
    container_name: apm_redis_slim
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6382:6379"
    volumes:
      - apm_redis_slim_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  apm_mysql_slim_data:
    driver: local
  apm_postgres_slim_data:
    driver: local
  apm_redis_slim_data:
    driver: local