version: '3.8'

# Slim Framework Application - Supporting Services
# Provides MySQL, PostgreSQL, and Redis for Slim Framework application

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: slim_framework-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: slim_framework_db
      MYSQL_USER: slim_framework_user
      MYSQL_PASSWORD: slim_framework_password
    ports:
      - "3309:3306"
    volumes:
      - slim_framework_mysql_data:/var/lib/mysql
    networks:
      - slim_framework-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: slim_framework-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: slim_framework_db
      POSTGRES_USER: slim_framework_user
      POSTGRES_PASSWORD: slim_framework_password
    ports:
      - "5435:5432"
    volumes:
      - slim_framework_postgres_data:/var/lib/postgresql/data
    networks:
      - slim_framework-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slim_framework_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: slim_framework-redis
    restart: unless-stopped
    ports:
      - "6382:6379"
    volumes:
      - slim_framework_redis_data:/data
    networks:
      - slim_framework-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # phpMyAdmin for MySQL Management
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: slim_framework-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8086:80"
    depends_on:
      - mysql
    networks:
      - slim_framework-network

  # pgAdmin for PostgreSQL Management (FIXED)
  pgadmin:
    image: dpage/pgadmin4
    container_name: slim_framework-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_LISTEN_ADDRESS: '0.0.0.0'
    ports:
      - "8087:80"
    volumes:
      - slim_framework_pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - slim_framework-network

  # Redis Commander for Redis Management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: slim_framework-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8088:8081"
    depends_on:
      - redis
    networks:
      - slim_framework-network

volumes:
  slim_framework_mysql_data:
    driver: local
  slim_framework_postgres_data:
    driver: local
  slim_framework_redis_data:
    driver: local
  slim_framework_pgadmin_data:
    driver: local

networks:
  slim_framework-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/16
