framework:
    cache:
        # Unique name of your app: used to compute stable namespaces for cache keys.
        #prefix_seed: your_vendor_name/app_name

        # The "app" cache stores to the filesystem by default.
        # The data in this cache should persist between deploys.
        # Other options include: cache.adapter.redis, cache.adapter.memcached
        app: cache.adapter.filesystem

        # The "system" cache is for Symfony's internal use.
        # The data in this cache should NOT persist between deploys.
        system: cache.adapter.system

        pools:
            # Redis pool for custom caching
            cache.redis:
                adapter: cache.adapter.redis
                provider: 'redis://%env(REDIS_HOST)%:%env(int:REDIS_PORT)%/%env(int:REDIS_DATABASE)%'
                default_lifetime: 3600

when@test:
    framework:
        cache:
            app: cache.adapter.array
            system: cache.adapter.array

when@prod:
    framework:
        cache:
            app: cache.adapter.redis
            system: cache.adapter.redis
            default_redis_provider: 'redis://%env(REDIS_HOST)%:%env(int:REDIS_PORT)%/%env(int:REDIS_DATABASE)%'
