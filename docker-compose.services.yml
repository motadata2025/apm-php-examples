# Shared Docker Services for APM PHP Examples
# This file provides common services (MySQL, PostgreSQL, Redis) for all applications

version: '3.8'

services:
  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: apm_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: apm_shared_db
      MYSQL_USER: apm_user
      MYSQL_PASSWORD: apm_password
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - apm_network
    command: --default-authentication-plugin=mysql_native_password

  # PostgreSQL Database Service
  postgres:
    image: postgres:15
    container_name: apm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: apm_shared_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - apm_network

  # Redis Cache and Queue Service
  redis:
    image: redis:7-alpine
    container_name: apm_redis
    restart: unless-stopped
    ports:
      - "6382:6379"
    volumes:
      - redis_data:/data
    networks:
      - apm_network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Adminer for Database Management
  adminer:
    image: adminer:latest
    container_name: apm_adminer
    restart: unless-stopped
    ports:
      - "8092:8080"
    networks:
      - apm_network
    depends_on:
      - mysql
      - postgres

  # Redis Commander for Redis Management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: apm_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:apm_redis:6379
    ports:
      - "8093:8081"
    networks:
      - apm_network
    depends_on:
      - redis

volumes:
  mysql_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  apm_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
